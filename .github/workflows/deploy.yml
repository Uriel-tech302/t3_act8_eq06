name: Despliegue Automático a VPS

on:
  push:
    branches:
      - main # El despliegue se lanza cuando hay cambios en main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Obtener el código del repositorio
        uses: actions/checkout@v3

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: 3. Instalar dependencias
        run: npm install

      - name: 4. Construir el proyecto de React
        run: npm run build

      - name: 5. Copiar los archivos al servidor VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "dist/*"
          target: "/var/www/html/t3_act8_eq06"
          strip_components: 1

      - name: 6. Ajustar permisos de Nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            chown -R www-data:www-data /var/www/html/t3_act8_eq06
            chmod -R 755 /var/www/html/t3_act8_eq06